<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acesso Administrativo — Trilhar Contabilidade</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="login-screen">
  <div class="login-blob"></div>
  <div class="login-blob gold"></div>
  <div class="login-card login-graphic">
    <div class="login-logo">
      <div class="brand-mark"><img src="img/logo-glyph.png" alt="Trilhar Contabilidade"></div>
      <div class="brand-name">TRILHAR CONTABILIDADE</div>
      <div class="brand-sub" id="login-context">ACESSO ADMINISTRATIVO</div>
    </div>

    <div class="field">
      <label>E-mail</label>
      <input type="email" placeholder="seuemail@trilharcontabilidade.com" value="tinaysa@trilharcontabilidade.com">
    </div>
    <div class="field">
      <label>Senha</label>
      <input type="password" placeholder="••••••••" value="123456">
    </div>

    <button class="btn btn-primary" id="btn-entrar-admin">Entrar</button>

    <div class="login-footnote">
      Acesso restrito à administração da Trilhar Contabilidade.<br>
      <a href="index.html" style="color: var(--brand-gold); font-size: 11px;" id="back-to-client"></a>
    </div>
  </div>

  <button class="theme-toggle" data-theme-toggle style="position:fixed; bottom:24px; right:24px;"></button>
</div>
<script src="js/app.js"></script>
<script>
  document.getElementById("back-to-client").innerHTML = ICONS.back + " Voltar para acesso de cliente";

  document.getElementById("btn-entrar-admin").addEventListener("click", function () {
    const btn = this;
    const original = btn.textContent;
    btn.disabled = true;
    btn.innerHTML = ICONS.spinner + " Entrando...";
    btn.classList.add("btn-loading");
    setTimeout(() => { window.location.href = "admin.html"; }, 700);
  });
</script>
</body>
</html>
