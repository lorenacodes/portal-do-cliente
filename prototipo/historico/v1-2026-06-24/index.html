<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal do Cliente — Trilhar Contabilidade</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="login-screen">
  <div class="login-blob"></div>
  <div class="login-blob gold"></div>
  <div class="login-card login-graphic">
    <div class="login-logo">
      <div class="brand-mark"><img src="img/logo-glyph.png" alt="Trilhar Contabilidade"></div>
      <div class="brand-name">TRILHAR CONTABILIDADE</div>
      <div class="brand-sub">SEU NEGÓCIO NO CAMINHO CERTO</div>
    </div>

    <div class="field">
      <label>E-mail</label>
      <input type="email" placeholder="seuemail@exemplo.com" value="cliente@exemplo.com">
    </div>
    <div class="field">
      <label>Senha</label>
      <input type="password" placeholder="••••••••" value="123456">
    </div>

    <button class="btn btn-primary" onclick="window.location.href='painel.html'">Entrar</button>

    <div class="login-footnote">
      Acesso fornecido pela Trilhar Contabilidade.<br>
      Esqueceu a senha? Fale com o escritório.<br>
      <a href="admin-login.html" style="color: var(--brand-gold); font-size: 11px;">[Demo] Entrar como administradora →</a>
    </div>
  </div>

  <button class="theme-toggle" data-theme-toggle style="position:fixed; bottom:24px; right:24px;"></button>
</div>
<script src="js/app.js"></script>
</body>
</html>
