<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Esqueci minha senha — Portal do Cliente</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="login-screen">
  <div class="login-card login-graphic">
    <div class="login-logo">
      <div class="brand-mark"><img src="img/logo-glyph.png" alt="Trilhar Contabilidade"></div>
      <div class="brand-name">TRILHAR CONTABILIDADE</div>
      <div class="brand-sub">RECUPERAR SENHA</div>
    </div>

    <p class="hint" id="instrucao" style="margin:0 0 20px; text-align:center;">Informe seu e-mail cadastrado. Se ele existir no sistema, você recebe um link pra criar uma senha nova.</p>

    <div class="field">
      <label>E-mail</label>
      <input type="email" id="email-input" placeholder="seuemail@exemplo.com">
    </div>

    <button class="btn btn-primary" id="btn-enviar" style="width:100%;">Enviar link de recuperação</button>

    <div class="login-footnote">
      <a href="index.html" id="voltar-link"></a>
    </div>
  </div>

  <button class="theme-toggle" data-theme-toggle style="position:fixed; bottom:24px; right:24px;"></button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>
<script src="js/app.js"></script>
<script>
  document.getElementById("voltar-link").innerHTML = ICONS.back + " Voltar para o login";

  document.getElementById("btn-enviar").addEventListener("click", async function () {
    const email = document.getElementById("email-input").value.trim();
    if (!email) { showToast("Informe seu e-mail."); return; }

    const btn = this;
    const original = btn.textContent;
    btn.disabled = true;
    btn.innerHTML = ICONS.spinner + " Enviando...";
    btn.classList.add("btn-loading");

    const redirectTo = new URL("redefinir-senha.html", window.location.href).href;
    await sb.auth.resetPasswordForEmail(email, { redirectTo });

    // Mensagem sempre genérica, independente do e-mail existir ou não —
    // não dá pra deixar alguém descobrir quais e-mails têm cadastro no sistema.
    document.getElementById("instrucao").textContent =
      "Se " + email + " estiver cadastrado, um link de recuperação foi enviado. Confira sua caixa de entrada (e o spam).";
    document.getElementById("email-input").value = "";
    btn.classList.remove("btn-loading");
    btn.disabled = false;
    btn.textContent = original;
  });
</script>
</body>
</html>
