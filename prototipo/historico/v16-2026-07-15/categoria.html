<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Categoria — Portal do Cliente</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div id="auth-guard-overlay" class="auth-guard-overlay"><div class="auth-guard-spinner"></div></div>
<div class="app-shell">
  <div class="topbar">
    <div class="brand">
      <div class="brand-mark"><img src="img/logo-glyph.png" alt="Trilhar Contabilidade"></div>
      <div>
        <div class="brand-name">TRILHAR CONTABILIDADE</div>
        <div class="brand-sub">SEU NEGÓCIO NO CAMINHO CERTO</div>
      </div>
    </div>
    <div class="topbar-actions">
      <div class="dropdown-wrap">
        <div class="user-chip" style="cursor:pointer" onclick="toggleDropdown('user-panel')">
          <div class="avatar">JS</div>
          <span>João Silva</span>
        </div>
        <div class="dropdown-panel" id="user-panel">
          <div class="dropdown-header">Conta</div>
          <div class="dropdown-item" onclick="window.location.href='perfil.html'"></div>
          <div class="dropdown-item" data-theme-toggle></div>
          <div class="dropdown-divider"></div>
          <div class="dropdown-item" onclick="window.location.href='index.html'"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="main">
    <span class="back-link" onclick="window.location.href='painel.html'" id="back-link"></span>

    <div class="page-header">
      <p class="eyebrow" id="cat-eyebrow">Categoria</p>
      <h1 class="page-title" id="cat-title">Boleto</h1>
      <p class="page-subtitle">Visualize e baixe seus arquivos. Vencimentos próximos aparecem em destaque.</p>
    </div>

    <div class="doc-list" id="doc-list"></div>
    <div id="empty-state" style="display:none;"></div>
  </div>
</div>

<!-- Preview modal -->
<div class="modal-overlay" id="modal-preview">
  <div class="modal modal-lg">
    <div class="preview-card"></div>
    <h3 id="preview-name">Documento</h3>
    <p class="hint" id="preview-meta">PDF</p>
    <div class="modal-actions" id="preview-download-actions"></div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="document.getElementById('modal-preview').classList.remove('open')">Fechar</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>
<script src="js/app.js"></script>
<script src="js/auth-guard.js"></script>
<script>
  document.getElementById("back-link").innerHTML = ICONS.back + " Voltar para o painel";
  document.querySelector(".preview-card").innerHTML = ICONS.doc;
  const userItems = document.querySelectorAll("#user-panel .dropdown-item");
  userItems[0].innerHTML = ICONS.user + " Meu perfil";
  userItems[2].innerHTML = ICONS.logout + " Sair";
  userItems[2].onclick = () => logoutCliente();

  function formatBytes(bytes) {
    if (!bytes) return "";
    if (bytes < 1024) return bytes + " B";
    if (bytes < 1024 * 1024) return Math.round(bytes / 1024) + " KB";
    return (bytes / (1024 * 1024)).toFixed(1) + " MB";
  }
  function metaTexto(arquivos) {
    if (!arquivos || arquivos.length === 0) return "Sem arquivo anexado";
    if (arquivos.length === 1) return arquivos[0].tipo_arquivo + (arquivos[0].tamanho_bytes ? " · " + formatBytes(arquivos[0].tamanho_bytes) : "");
    return arquivos.map(f => f.tipo_arquivo).join(" + ");
  }
  function dataBr(iso) {
    return new Date(iso).toLocaleDateString("pt-BR");
  }
  function dueTag(doc) {
    const s = statusBoleto(doc);
    return s ? `<span class="due-tag ${s.cls}">${s.label}</span>` : "";
  }

  const params = new URLSearchParams(window.location.search);
  const slug = params.get("cat") || "";
  let docsCarregados = [];

  (async function init() {
    const cliente = await guardCliente();
    if (!cliente) return;

    const { data: categoria } = await sb.from("categorias")
      .select("id, slug, nome")
      .eq("slug", slug)
      .maybeSingle();

    if (!categoria) {
      document.getElementById("cat-title").textContent = "Categoria não encontrada";
      document.getElementById("cat-eyebrow").textContent = "Categoria";
      renderEmptyState("Categoria não encontrada", "Esse link pode estar desatualizado. Volte ao painel e escolha a categoria pela lista.");
      hideAuthOverlay();
      return;
    }

    document.getElementById("cat-title").textContent = categoria.nome;
    document.getElementById("cat-eyebrow").textContent = "Categoria · " + categoria.nome;

    const { data: docs } = await sb.from("documentos")
      .select("id, nome, valor, data_vencimento, status, pago_em, created_at, documento_arquivos(id, tipo_arquivo, nome_original, storage_path, tamanho_bytes)")
      .eq("cliente_id", cliente.id)
      .eq("categoria_id", categoria.id)
      .order("created_at", { ascending: false });

    docsCarregados = docs || [];
    hideAuthOverlay();
    render(docsCarregados);

    // Modo de foco: quem chegou aqui pelo "Resolver agora" do painel já cai
    // direto na pré-visualização do documento certo — zero cliques extras.
    const abrir = params.get("abrir");
    if (abrir) {
      const docAlvo = docsCarregados.find(d => d.nome === abrir);
      if (docAlvo) openPreview(docAlvo);
    }
  })();

  function renderEmptyState(titulo, texto) {
    document.getElementById("doc-list").style.display = "none";
    const emptyState = document.getElementById("empty-state");
    emptyState.style.display = "block";
    emptyState.innerHTML = `
      <div class="empty-state">
        ${ICONS.empty}
        <h3>${titulo}</h3>
        <p>${texto}</p>
      </div>`;
  }

  function render(docs) {
    const list = document.getElementById("doc-list");

    if (docs.length === 0) {
      renderEmptyState("Nenhum documento aqui ainda", "Quando a Trilhar Contabilidade enviar um documento desta categoria, ele aparecerá aqui automaticamente.");
      return;
    }

    docs.forEach(doc => {
      const row = document.createElement("div");
      row.className = "doc-row";
      row.style.cursor = "pointer";
      row.innerHTML = `
        <div class="doc-icon">${ICONS.doc}</div>
        <div class="doc-info">
          <p class="doc-name">${doc.nome}</p>
          <p class="doc-meta">${metaTexto(doc.documento_arquivos)} · Enviado em ${dataBr(doc.created_at)}</p>
        </div>
        ${dueTag(doc)}
        <button class="btn btn-secondary preview-trigger">${ICONS.doc} Visualizar</button>
      `;
      row.querySelector(".preview-trigger").addEventListener("click", (e) => {
        e.stopPropagation();
        openPreview(doc);
      });
      list.appendChild(row);
    });
  }

  function openPreview(doc) {
    document.getElementById("preview-name").textContent = doc.nome;
    document.getElementById("preview-meta").textContent = metaTexto(doc.documento_arquivos) + " · Enviado em " + dataBr(doc.created_at);

    const actions = document.getElementById("preview-download-actions");
    actions.innerHTML = "";
    const arquivos = doc.documento_arquivos || [];
    if (arquivos.length === 0) {
      actions.innerHTML = '<p class="hint">Nenhum arquivo anexado a este documento.</p>';
    } else {
      arquivos.forEach(f => {
        const btn = document.createElement("button");
        btn.className = "btn btn-primary";
        btn.innerHTML = ICONS.download + " Baixar " + f.tipo_arquivo;
        btn.onclick = () => downloadFile(btn, f.storage_path, f.nome_original);
        actions.appendChild(btn);
      });
    }
    document.getElementById("modal-preview").classList.add("open");
  }
</script>
</body>
</html>
