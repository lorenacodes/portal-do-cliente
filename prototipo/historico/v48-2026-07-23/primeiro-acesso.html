<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Definir nova senha — Portal do Cliente</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css?v=33">
</head>
<body>
<div id="auth-guard-overlay" class="auth-guard-overlay"><div class="auth-guard-spinner"></div></div>
<div class="login-screen">
  <div class="login-card login-graphic" style="width:420px;">
    <div class="login-logo">
      <div class="brand-mark"><img src="img/logo-glyph.png" alt="Trilhar Contabilidade"></div>
      <div class="brand-name">Trilhar Contabilidade</div>
      <div class="brand-sub">PRIMEIRO ACESSO</div>
    </div>

    <p class="hint" style="margin:0 0 20px; text-align:center;">Essa é a primeira vez que você entra. Defina uma senha nova antes de continuar.</p>

    <div class="field">
      <label>Nova senha</label>
      <input type="password" id="nova-senha" placeholder="••••••••">
    </div>
    <div class="senha-forca-bar" id="forca-bar">
      <div class="senha-forca-bar-seg"></div>
      <div class="senha-forca-bar-seg"></div>
      <div class="senha-forca-bar-seg"></div>
      <div class="senha-forca-bar-seg"></div>
    </div>
    <p class="senha-forca-label" id="forca-label"></p>
    <ul class="senha-criterios" id="senha-criterios"></ul>

    <div class="field" style="margin-top:20px;">
      <label>Confirmar nova senha</label>
      <input type="password" id="confirmar-senha" placeholder="••••••••">
    </div>
    <p class="field-error" id="senha-erro"></p>

    <button class="btn btn-primary" id="btn-trocar-senha" style="width:100%;" disabled>Definir nova senha</button>
    <p class="hint" id="motivo-btn" style="text-align:center; margin-top:8px; min-height:16px;"></p>
  </div>

  <button class="theme-toggle" data-theme-toggle style="position:fixed; bottom:24px; right:24px;"></button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js?v=33"></script>
<script src="js/app.js?v=33"></script>
<script src="js/auth-guard.js?v=33"></script>
<script>
  const CRITERIOS = [
    { key: "tamanho", texto: "Pelo menos 8 caracteres (ideal 12+)" },
    { key: "maiuscula", texto: "Uma letra maiúscula" },
    { key: "minuscula", texto: "Uma letra minúscula" },
    { key: "numero", texto: "Um número" },
    { key: "especial", texto: "Um caractere especial" },
    { key: "naoComum", texto: "Não ser uma senha muito comum" }
  ];
  document.getElementById("senha-criterios").innerHTML = CRITERIOS.map(c =>
    `<li class="senha-criterio" data-c="${c.key}">${ICONS.check}<span>${c.texto}</span></li>`
  ).join("");

  let USUARIO = null;
  const inputNovaSenha = document.getElementById("nova-senha");
  const inputConfirmar = document.getElementById("confirmar-senha");
  const btn = document.getElementById("btn-trocar-senha");
  const erroEl = document.getElementById("senha-erro");

  function atualizarForca() {
    const resultado = avaliarForcaSenha(inputNovaSenha.value);
    document.querySelectorAll(".senha-forca-bar-seg").forEach((seg, i) => {
      seg.className = "senha-forca-bar-seg" + (i < resultado.pontos && resultado.label ? " on " + resultado.cls : "");
    });
    const label = document.getElementById("forca-label");
    label.textContent = resultado.label;
    label.className = "senha-forca-label" + (resultado.cls ? " " + resultado.cls : "");

    document.querySelectorAll(".senha-criterio").forEach(li => {
      li.classList.toggle("ok", !!resultado.criterios[li.dataset.c]);
    });

    const senhasIguais = inputNovaSenha.value.length > 0 && inputNovaSenha.value === inputConfirmar.value;
    if (inputConfirmar.value.length > 0 && !senhasIguais) {
      erroEl.textContent = "As senhas não coincidem.";
      erroEl.classList.add("show");
    } else {
      erroEl.classList.remove("show");
    }

    const podeEnviar = resultado.valida && senhasIguais;
    btn.disabled = !podeEnviar;

    const motivoEl = document.getElementById("motivo-btn");
    if (podeEnviar || inputNovaSenha.value.length === 0) {
      motivoEl.textContent = "";
    } else if (!resultado.valida) {
      motivoEl.textContent = "O botão libera quando todos os critérios acima ficarem verdes.";
    } else if (inputConfirmar.value.length === 0) {
      motivoEl.textContent = "Confirme a senha no campo abaixo pra habilitar o botão.";
    } else {
      motivoEl.textContent = "As senhas precisam ser idênticas pra habilitar o botão.";
    }
  }

  inputNovaSenha.addEventListener("input", atualizarForca);
  inputConfirmar.addEventListener("input", atualizarForca);
  atualizarForca();

  btn.addEventListener("click", async () => {
    btn.disabled = true;
    const original = btn.textContent;
    btn.innerHTML = ICONS.spinner + " Salvando...";
    btn.classList.add("btn-loading");

    const { error } = await sb.auth.updateUser({ password: inputNovaSenha.value });
    if (error) {
      showToast("Não foi possível definir a senha. Tente novamente.");
      btn.disabled = false;
      btn.classList.remove("btn-loading");
      btn.textContent = original;
      atualizarForca();
      return;
    }

    await sb.rpc("marcar_primeiro_acesso_concluido");
    window.location.href = USUARIO && USUARIO.tipo === "administrador" ? "admin.html" : "dashboard.html";
  });

  (async function init() {
    const usuario = await guardPrimeiroAcesso();
    if (!usuario) return;
    USUARIO = usuario;
    hideAuthOverlay();
  })();
</script>
</body>
</html>
