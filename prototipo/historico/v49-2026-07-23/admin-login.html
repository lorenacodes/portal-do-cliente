<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acesso Administrativo — Trilhar Contabilidade</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css?v=34">
</head>
<body>
<div class="login-screen">
  <div class="login-card login-graphic">
    <div class="login-logo">
      <div class="brand-mark"><img src="img/logo-glyph.png" alt="Trilhar Contabilidade"></div>
      <div class="brand-name">Trilhar Contabilidade</div>
      <div class="brand-sub" id="login-context">ACESSO ADMINISTRATIVO</div>
    </div>

    <div class="field">
      <label>E-mail</label>
      <input type="email" id="login-email" placeholder="seuemail@trilharcontabilidade.com">
    </div>
    <div class="field">
      <label>Senha</label>
      <input type="password" id="login-password" placeholder="••••••••">
    </div>
    <p class="field-error" id="login-error"></p>

    <button class="btn btn-primary" id="btn-entrar-admin">Entrar</button>

    <div class="login-footnote">
      Acesso restrito à administração da Trilhar Contabilidade.<br>
      <a href="esqueci-senha.html">Esqueci minha senha</a><br>
      <a href="index.html" id="back-to-client"></a>
    </div>
  </div>

  <button class="theme-toggle" data-theme-toggle style="position:fixed; bottom:24px; right:24px;"></button>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js?v=34"></script>
<script src="js/app.js?v=34"></script>
<script>
  document.getElementById("back-to-client").innerHTML = ICONS.back + " Voltar para acesso de cliente";

  const loginBtn = document.getElementById("btn-entrar-admin");
  const loginError = document.getElementById("login-error");
  function showLoginError(msg) {
    loginError.textContent = msg;
    loginError.classList.add("show");
  }

  const params = new URLSearchParams(window.location.search);
  if (params.get("erro") === "sem_permissao") {
    showLoginError("Este e-mail não tem permissão para acessar o sistema. Fale com a Trilhar Contabilidade.");
  } else if (params.get("senha_redefinida") === "1") {
    showToast("Senha redefinida com sucesso. Faça login com a nova senha.");
  }

  async function handleLogin() {
    const email = document.getElementById("login-email").value.trim();
    const password = document.getElementById("login-password").value;
    loginError.classList.remove("show");

    if (!email || !password) {
      showLoginError("Preencha e-mail e senha.");
      return;
    }

    loginBtn.disabled = true;
    loginBtn.classList.add("btn-loading");
    const original = loginBtn.textContent;
    loginBtn.innerHTML = ICONS.spinner + " Entrando...";

    const { data, error } = await sb.auth.signInWithPassword({ email, password });
    if (error) {
      showLoginError("E-mail ou senha incorretos.");
      loginBtn.disabled = false;
      loginBtn.classList.remove("btn-loading");
      loginBtn.textContent = original;
      return;
    }

    const { data: usuario, error: usuarioError } = await sb
      .from("users")
      .select("tipo, status, primeiro_acesso")
      .eq("auth_user_id", data.user.id)
      .maybeSingle();

    if (usuarioError || !usuario || usuario.tipo !== "administrador" || usuario.status !== "ativo") {
      await sb.auth.signOut();
      showLoginError("Este e-mail não tem permissão para acessar o sistema. Fale com a Trilhar Contabilidade.");
      loginBtn.disabled = false;
      loginBtn.classList.remove("btn-loading");
      loginBtn.textContent = original;
      return;
    }

    window.location.href = usuario.primeiro_acesso ? "primeiro-acesso.html" : "admin.html";
  }

  loginBtn.addEventListener("click", handleLogin);
  document.getElementById("login-password").addEventListener("keydown", (e) => {
    if (e.key === "Enter") handleLogin();
  });
</script>
</body>
</html>
