<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Histórico de Versões — Protótipo Trilhar Contabilidade</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/styles.css">
</head>
<body>
<div class="app-shell">
  <div class="topbar">
    <div class="brand">
      <div class="brand-mark"><img src="../img/logo-glyph.png" alt="Trilhar Contabilidade"></div>
      <div>
        <div class="brand-name">TRILHAR CONTABILIDADE</div>
        <div class="brand-sub">HISTÓRICO DE VERSÕES DO PROTÓTIPO</div>
      </div>
    </div>
    <div class="topbar-actions">
      <a href="../index.html" class="btn btn-secondary">Voltar ao protótipo atual</a>
    </div>
  </div>

  <div class="main">
    <div class="page-header">
      <p class="eyebrow">Versionamento</p>
      <h1 class="page-title">Histórico de versões</h1>
      <p class="page-subtitle">Cada versão é uma cópia congelada do protótipo num momento específico — abra direto pelo navegador para comparar com a versão atual.</p>
    </div>

    <div class="table-card">
      <table>
        <thead>
          <tr><th>Versão</th><th>Data</th><th>Descrição</th><th></th></tr>
        </thead>
        <tbody id="versions-tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<script src="../js/app.js"></script>
<script>
  const VERSIONS = [
    {
      pasta: "v1-2026-06-24",
      data: "24/06/2026",
      descricao: "Primeira versão estável: login, painel do cliente, categorias, painel administrativo completo (clientes, documentos, administradores, calendário de vencimentos), painéis laterais de cadastro/upload, temas claro/escuro."
    },
    {
      pasta: "v2-2026-06-25",

    },
    {
      pasta: "v3-2026-06-25",

    },
    {
      pasta: "v6-2026-06-25",

    {

    },
    {

    },
    {

    },
    {
      pasta: "v14-2026-07-14",
      data: "14/07/2026",
      descricao: "Integração Supabase (Fase A): login do cliente passou a autenticar de verdade (Supabase Auth) com checagem de cadastro ativo em 'clientes', guarda de sessão nas páginas do cliente (painel, categoria, perfil) com overlay anti-flash, painel e categoria agora consultam categorias/documentos reais do banco (RLS garante isolamento por cliente), notas fiscais e demais documentos suportam múltiplos arquivos anexados (ex.: PDF + XML), download via URL assinada do Supabase Storage, logout real. admin.html permanece 100% mock — fica pra uma Fase B separada. Removido admin_inline.js (código morto)."
    },
    {
      pasta: "v15-2026-07-15",
      data: "15/07/2026",
      descricao: "Regra de negócio: só boleto tem data de vencimento e status de pagamento — status virou binário (Pago/Não Pago) no banco, em vez do enum de 5 estados anterior. 'Vencendo'/'Vencido' deixaram de ser guardados e passaram a ser calculados na tela (statusBoleto em app.js) a partir do vencimento vs hoje. Trigger no banco agora também proíbe vencimento/status em documentos que não são boleto. Painel e categoria atualizados pra refletir essa regra."
    },
    {
      pasta: "v16-2026-07-15",
      data: "15/07/2026",
      descricao: "Responsividade mobile-first em todo o sistema, incluindo admin.html (que ainda não tinha recebido nenhum ajuste): corrigido bug real onde modais com largura fixa via style inline (460/380/400px) nunca respeitavam a media query mobile; dropdown de notificações/conta e filtros do admin agora cabem e empilham corretamente em telas pequenas; as 3 tabelas do admin (Clientes, Documentos enviados, Administradores + Convites pendentes) viram cartões empilhados no celular em vez de forçar scroll horizontal; calendário mini ganhou escala reduzida em telas bem estreitas; removido bloco de CSS morto (@container dashmain referenciando classes inexistentes); alvos de toque dos botões-ícone aumentados para 40px no mobile. Também aplicada em admin.html a mesma regra de status binário de boleto (v15): Select Pago/Não Pago substitui a ação 'Marcar como pago', 'Vencendo'/'Vencido' calculados a partir do vencimento, documentos comuns sem nenhum status."
    },
    {
      pasta: "v17-2026-07-15",
      data: "15/07/2026",
      descricao: "Redesign premium do lado do cliente + separação estrutural boleto vs documento. painel.html e categoria.html aposentados — substituídos por 5 páginas dedicadas: dashboard.html (só indicadores: em aberto, valor total, vencendo, vencidos, alertas, próximos vencimentos, resumo financeiro), boletos.html (tela principal — lista financeira nova, sem ser tabela, filtros por chip em vez de select), documentos.html (drive-like: categorias, busca, ordenação, preview — nenhuma coluna de vencimento/status), enviar-documento.html (cliente agora pode enviar documento próprio, não-boleto — nova migração de banco com policies de INSERT e coluna 'origem'), e perfil.html com retoque leve. Navegação nova (sidebar desktop / barra inferior mobile) via renderNav() compartilhado. Sistema de design novo em styles.css: escala tipográfica e de espaçamento, disciplina de cor (navy/gold restritos), sombra só em elevação real, radii consolidados, badge único, KPI tile sem ícone com número herói, dropzone com borda sólida. admin.html não foi tocado nesta rodada — fica pra uma etapa seguinte."
    },
    {
      pasta: "v18-2026-07-15",
      data: "15/07/2026",
      descricao: "Autenticação real e RBAC de produção. Nova tabela 'users' vira a única fonte de identidade/permissão (nome, e-mail, tipo administrador/cliente, status, primeiro_acesso) — 'clientes'/'administradores' encolhem pra tabelas de detalhe (CPF/CNPJ, nível), referenciando users.id. RLS reescrita com funções security definer (is_admin(), current_cliente_id()) com search_path fixado, evitando recursão infinita. admin.html ganha login/guarda de sessão real pela primeira vez (guardAdministrador()), sem mexer nas telas internas mock. Fluxo de primeiro acesso obrigatório (primeiro-acesso.html) com medidor de força de senha em tempo real (Fraca/Regular/Boa/Forte + checklist de critérios). Recuperação de senha via fluxo oficial do Supabase (esqueci-senha.html + redefinir-senha.html, com onAuthStateChange ouvindo PASSWORD_RECOVERY). Login (index.html/admin-login.html) passa a checar a tabela users e mostra mensagem amigável quando o usuário existe no Auth mas não tem permissão cadastrada."
    },
    {
      pasta: "v19-2026-07-15",
      data: "15/07/2026",
      descricao: "admin.html: as abas (Clientes/Documentos enviados/Categorias/Administradores) saem da barra horizontal no meio da tela e viram um painel de navegação lateral no desktop/tablet — mesma linguagem visual da sidebar do cliente (acento à esquerda em vez de sublinhado), melhor escalabilidade conforme mais seções forem adicionadas. Em telas ≤1024px volta a ser uma tira horizontal com scroll, preservando o comportamento mobile já validado. Só CSS/estrutura — nenhuma lógica interna do admin.html foi alterada."
    }
  ];

  const tbody = document.getElementById("versions-tbody");
  VERSIONS.slice().reverse().forEach((v, i) => {
    const isLatest = i === 0;
    const row = document.createElement("tr");
    row.innerHTML = `
      <td style="font-weight:700;">${v.pasta}${isLatest ? ' <span class="due-tag ok" style="margin-left:6px;">Mais recente</span>' : ''}</td>
      <td>${v.data}</td>
      <td style="max-width:420px; color:var(--text-secondary); font-size:13px;">${v.descricao}</td>
      <td style="text-align:right;"><a href="${v.pasta}/index.html" class="btn btn-secondary" target="_blank">Abrir</a></td>
    `;
    tbody.appendChild(row);
  });
</script>
</body>
</html>
